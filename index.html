<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sisterhood Atlas · 职场智囊</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --bg: #0e0d0b;
    --surface: #161510;
    --surface2: #1e1c17;
    --border: #2a2820;
    --gold: #c9a96e;
    --gold-dim: #7a6440;
    --cream: #f0e8d5;
    --cream-dim: #8a7f6a;
    --text: #d4c9b0;
    --text-dim: #6b6255;
    --accent: #9b6e4a;
    --green: #5a8a6a;
    --red: #8a4a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    font-style: italic;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header-nav {
    display: flex;
    gap: 4px;
  }

  .nav-btn {
    padding: 6px 14px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .nav-btn.active {
    border-color: var(--gold-dim);
    color: var(--gold);
    background: rgba(201, 169, 110, 0.06);
  }

  .nav-btn:hover {
    color: var(--cream-dim);
    border-color: var(--border);
  }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 0;
  }

  /* Panels */
  .panel { display: none; flex: 1; flex-direction: column; }
  .panel.active { display: flex; }

  /* ── CHAT PANEL ── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, #2a2218, #3d3020);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 2px;
    line-height: 1.75;
    font-size: 14px;
  }

  .bubble.ai {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-left: 2px solid var(--gold-dim);
  }

  .bubble.user {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--cream-dim);
    text-align: right;
  }

  .step-card {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .step-header {
    padding: 8px 14px;
    background: var(--surface2);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }

  .step-body {
    padding: 12px 14px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.8;
  }

  .step-body ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .step-body li::before {
    content: '·';
    color: var(--gold-dim);
    margin-right: 8px;
  }

  .verify-link {
    display: inline-block;
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--gold-dim);
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }

  .verify-link:hover { color: var(--gold); }

  .disclaimer {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .qr-btn {
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .qr-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
    background: rgba(201,169,110,0.04);
  }

  /* Input area */
  .chat-input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  #chatInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    resize: none;
    outline: none;
    line-height: 1.6;
    min-height: 42px;
    max-height: 120px;
    transition: border-color 0.2s;
  }

  #chatInput:focus { border-color: var(--gold-dim); }
  #chatInput::placeholder { color: var(--text-dim); }

  .send-btn {
    padding: 10px 18px;
    background: var(--gold-dim);
    border: none;
    border-radius: 2px;
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .send-btn:hover { background: var(--gold); }

  /* ── ATLAS PANEL ── */
  .atlas-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .atlas-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .atlas-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .atlas-grid {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    flex: 1;
  }

  .industry-card {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .industry-card:hover {
    border-color: var(--gold-dim);
    background: var(--surface2);
  }

  .industry-card.expanded {
    border-color: var(--gold-dim);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .industry-name {
    font-size: 15px;
    color: var(--cream);
    font-weight: 400;
  }

  .card-badges {
    display: flex;
    gap: 6px;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 1px;
    letter-spacing: 0.05em;
  }

  .badge.good { background: rgba(90,138,106,0.15); color: var(--green); border: 1px solid rgba(90,138,106,0.3); }
  .badge.mid  { background: rgba(201,169,110,0.1); color: var(--gold-dim); border: 1px solid rgba(201,169,110,0.2); }
  .badge.bad  { background: rgba(138,74,74,0.15); color: var(--red); border: 1px solid rgba(138,74,74,0.3); }

  .card-detail {
    display: none;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .industry-card.expanded .card-detail { display: block; }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .metric {
    background: var(--surface2);
    padding: 10px 12px;
    border-radius: 2px;
  }

  .metric-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .metric-value {
    font-size: 18px;
    color: var(--gold);
    font-weight: 300;
  }

  .metric-unit {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 3px;
  }

  .bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .salary-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }

  .salary-val { color: var(--cream-dim); }

  .card-note {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    line-height: 1.7;
  }

  .card-cta {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }

  .cta-btn {
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }

  .cta-chat {
    background: rgba(201,169,110,0.1);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
  }

  .cta-chat:hover { background: rgba(201,169,110,0.18); }

  .cta-verify {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .cta-verify:hover { color: var(--cream-dim); border-color: var(--cream-dim); }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 48px 24px 24px;
  }

  .welcome-icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .welcome-title {
    font-size: 18px;
    color: var(--cream-dim);
    font-weight: 300;
    margin-bottom: 8px;
  }

  .welcome-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  .welcome-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    align-items: center;
  }

  .typing span {
    width: 5px; height: 5px;
    background: var(--gold-dim);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .bubble { max-width: 88%; }
    .metrics { grid-template-columns: 1fr; }
    .logo-main { font-size: 18px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <span class="logo-main">Sisterhood Atlas</span>
    <span class="logo-sub">v0.1 · Beta</span>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="switchPanel('chat', this)">对话</button>
    <button class="nav-btn" onclick="switchPanel('atlas', this)">指南针</button>
  </nav>
</header>

<!-- CHAT PANEL -->
<div class="main">
  <div id="chatPanel" class="panel active">
    <div class="chat-messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">S</div>
        <div class="welcome-title">你好，我在这里</div>
        <div class="welcome-sub">
          先听你说，再帮你想<br>
          不评判，不说教，只陪你理清思路
        </div>
        <div class="welcome-prompts">
          <button class="qr-btn" onclick="sendQuick('我最近在考虑辞职，有点迷茫')">考虑辞职</button>
          <button class="qr-btn" onclick="sendQuick('想了解考公的路径')">备考考公</button>
          <button class="qr-btn" onclick="sendQuick('工资太低了不知道怎么办')">薪资问题</button>
          <button class="qr-btn" onclick="sendQuick('想转行但不知道从哪里开始')">考虑转行</button>
          <button class="qr-btn" onclick="sendQuick('在婚姻里感觉很累')">情感支持</button>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-wrap">
        <textarea id="chatInput" placeholder="说说你的情况…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" onclick="handleSend()">发送</button>
    </div>
  </div>

  <!-- ATLAS PANEL -->
  <div id="atlasPanel" class="panel">
    <div class="atlas-header">
      <div class="atlas-title">行业指南针</div>
      <div class="atlas-sub">数据基于公开研究综合评估 · 仅供参考 · 请以实际平台核验</div>
    </div>
    <div class="atlas-grid" id="atlasGrid"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const INDUSTRY_DB = {
  "互联网": {
    pay_gap: 0.82, maternity: 2, remote: 0.45, female_leadership: 0.23,
    salary: { junior: [8000,15000], mid: [15000,30000], senior: [30000,60000] },
    notes: "大厂执行较好，中小厂差异大。生育期晋升存在隐性壁垒。",
    verify: "https://www.zhipin.com"
  },
  "教育": {
    pay_gap: 0.91, maternity: 4, remote: 0.30, female_leadership: 0.48,
    salary: { junior: [5000,9000], mid: [9000,18000], senior: [18000,35000] },
    notes: "公立学校生育保障最好，培训机构差异极大，需按实际情况判断。",
    verify: "https://www.zhipin.com"
  },
  "医疗": {
    pay_gap: 0.88, maternity: 4, remote: 0.05, female_leadership: 0.41,
    salary: { junior: [6000,12000], mid: [12000,25000], senior: [25000,80000] },
    notes: "医生晋升周期长，护理女性比例高但薪资天花板相对低。",
    verify: "https://www.zhipin.com"
  },
  "金融": {
    pay_gap: 0.79, maternity: 3, remote: 0.20, female_leadership: 0.28,
    salary: { junior: [8000,16000], mid: [16000,35000], senior: [35000,100000] },
    notes: "券商投行性别薪资差距明显，银行柜员女性多但晋升通道窄。",
    verify: "https://www.zhipin.com"
  },
  "公务员": {
    pay_gap: 0.95, maternity: 5, remote: 0.05, female_leadership: 0.35,
    salary: { junior: [4000,8000], mid: [8000,15000], senior: [15000,30000] },
    notes: "生育保障全行业最好，部分岗位有性别限制，报名前务必确认。",
    verify: "https://www.scs.gov.cn"
  },
  "电商/新媒体": {
    pay_gap: 0.87, maternity: 2, remote: 0.55, female_leadership: 0.45,
    salary: { junior: [6000,12000], mid: [12000,25000], senior: [25000,60000] },
    notes: "灵活度高，但创业型公司生育保障薄弱，需提前评估。",
    verify: "https://www.zhipin.com"
  },
  "制造业": {
    pay_gap: 0.76, maternity: 3, remote: 0.05, female_leadership: 0.18,
    salary: { junior: [4000,7000], mid: [7000,14000], senior: [14000,28000] },
    notes: "管理岗女性比例低，一线工人占比高，晋升通道较窄。",
    verify: "https://www.zhipin.com"
  },
  "法律": {
    pay_gap: 0.81, maternity: 3, remote: 0.25, female_leadership: 0.32,
    salary: { junior: [6000,12000], mid: [12000,30000], senior: [30000,100000] },
    notes: "律所收入方差极大，法务岗相对稳定，入门需考取资格证。",
    verify: "https://www.zhipin.com"
  },
  "心理咨询": {
    pay_gap: 0.93, maternity: 4, remote: 0.60, female_leadership: 0.62,
    salary: { junior: [3000,8000], mid: [8000,20000], senior: [20000,60000] },
    notes: "入门到成熟期路径较长，但成熟后收入弹性大，适合灵活工作。",
    verify: "https://www.zhipin.com"
  },
  "设计/创意": {
    pay_gap: 0.85, maternity: 2, remote: 0.50, female_leadership: 0.40,
    salary: { junior: [6000,11000], mid: [11000,22000], senior: [22000,50000] },
    notes: "自由职业可能性高，平台接单可作为过渡或兼职方案。",
    verify: "https://www.zhipin.com"
  }
};

const TRIGGERS = {
  career_change: ["转行","换工作","换个方向","换行业"],
  resignation:   ["辞职","不想干","离职","裸辞","想走"],
  exam:          ["考公","考编","上岸","备考","公务员"],
  financial:     ["没钱","工资低","涨薪","被裁","薪资","钱不够"],
  family:        ["回家","全职","带孩子","婆婆","彩礼","婚姻","老公","结婚","离婚","情感","委屈","累"]
};

// ── API HOOK (预留接口) ───────────────────────────────────────────────
const USE_API = false;
const API_ENDPOINT = "/api/chat";

async function callLLM(userMessage, context) {
  if (!USE_API) return null;
  try {
    const res = await fetch(API_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: userMessage, context })
    });
    const data = await res.json();
    return data.reply;
  } catch(e) { return null; }
}

// ── CONVERSATION STATE ────────────────────────────────────────────────
// phase: "listen" → "explore" → "advise"
// listen:  第一轮，纯共情，不分析
// explore: 温柔引导，问一个问题，帮用户说清楚
// advise:  用户准备好了，才给建议
let convState = {
  phase: "listen",
  intent: null,
  industry: null,
  turnCount: 0,
  userAskedAdvice: false
};

const ADVICE_SIGNALS = ["怎么办","怎么做","建议","该怎么","帮我想","路径","下一步","分析一下","给我一些","有什么方法"];

function detectIntent(text) {
  for (const [intent, keywords] of Object.entries(TRIGGERS)) {
    if (keywords.some(k => text.includes(k))) return intent;
  }
  return "general";
}

function detectIndustry(text) {
  return Object.keys(INDUSTRY_DB).find(ind => text.includes(ind)) || null;
}

function wantsAdvice(text) {
  return ADVICE_SIGNALS.some(s => text.includes(s));
}

function formatSalary(range) {
  return `${(range[0]/1000).toFixed(0)}k – ${(range[1]/1000).toFixed(0)}k`;
}

function maternityLabel(score) {
  const map = {1:"较差",2:"一般",3:"中等",4:"较好",5:"最好"};
  return map[score] || "-";
}

function maternityBadge(score) {
  if (score >= 4) return "good";
  if (score === 3) return "mid";
  return "bad";
}

function payGapBadge(ratio) {
  if (ratio >= 0.90) return "good";
  if (ratio >= 0.83) return "mid";
  return "bad";
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function buildResponse(userText) {
  const detectedIntent = detectIntent(userText);
  const detectedIndustry = detectIndustry(userText);

  // Update state
  if (detectedIntent !== "general" && !convState.intent) {
    convState.intent = detectedIntent;
  }
  if (detectedIndustry) convState.industry = detectedIndustry;
  if (wantsAdvice(userText)) convState.userAskedAdvice = true;
  convState.turnCount++;

  const intent = convState.intent || detectedIntent;

  // 如果用户主动要建议，直接进入 advise 阶段
  if (convState.userAskedAdvice || convState.phase === "advise") {
    convState.phase = "advise";
    return buildAdviceHTML(intent, convState.industry);
  }

  // Phase logic
  if (convState.phase === "listen") {
    convState.phase = "explore";
    const line = pickRandom(EMPATHY_FIRST[intent] || EMPATHY_FIRST.general);
    // 第一轮：纯共情 + 随机语气颗粒
    return wrapWithParticle(line);
  }

  if (convState.phase === "explore") {
    convState.phase = "ready_check";
    const line = pickRandom(EMPATHY_EXPLORE[intent] || EMPATHY_EXPLORE.general);
    const affirm = getParticle("affirm");
    return `<p>${affirm}</p><p>${line}</p>
    <div class="quick-replies">
      <button class="qr-btn" onclick="sendQuick('帮我想想怎么办')">准备好了，帮我想想</button>
      <button class="qr-btn" onclick="sendQuick('我还想多说说')">我还想多说说</button>
    </div>`;
  }

  if (convState.phase === "ready_check") {
    convState.phase = "advise";
    const warm = getParticle("warm");
    const bridge = getParticle("bridge");
    return `<p>${warm}</p><p>${bridge}</p>
    <div class="quick-replies">
      <button class="qr-btn" onclick="sendQuick('好，帮我分析一下')">好，帮我分析一下</button>
      <button class="qr-btn" onclick="sendQuick('我还没准备好')">我还没准备好</button>
    </div>`;
  }

  // advise phase fallback
  return buildAdviceHTML(intent, convState.industry);
}

function buildAdviceHTML(intent, industry) {
  const data = buildAdvice(intent, industry);
  const ind = industry ? INDUSTRY_DB[industry] : null;

  let html = `<p>${data.intro}</p>
  <div class="step-card">
    <div class="step-header"><div class="step-dot"></div>一些想法，供你参考</div>
    <div class="step-body">
      <ul>${data.points.map(p => `<li>${p}</li>`).join("")}</ul>
    </div>
  </div>`;

  if (ind) {
    html += `<a class="verify-link" href="${ind.verify}" target="_blank">→ 去Boss直聘核验${industry}薪资数据</a>`;
  }

  html += `<div class="disclaimer">这些只是思路参考，最终怎么做还是你说了算</div>`;

  if (data.followups) {
    html += `<div class="quick-replies">
      ${data.followups.map(q => `<button class="qr-btn" onclick="sendQuick('${q}')">${q}</button>`).join("")}
    </div>`;
  }

  return html;
}

const messages = document.getElementById("messages");

function addMessage(html, role) {
  const wrap = document.createElement("div");
  wrap.className = `message ${role}`;

  const avatar = document.createElement("div");
  avatar.className = `avatar ${role === "ai" ? "ai" : "user-av"}`;
  avatar.textContent = role === "ai" ? "S" : "我";

  const bubble = document.createElement("div");
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = html;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement("div");
  wrap.className = "message ai";
  wrap.id = "typing-indicator";

  const avatar = document.createElement("div");
  avatar.className = "avatar ai";
  avatar.textContent = "S";

  const bubble = document.createElement("div");
  bubble.className = "bubble ai typing";
  bubble.innerHTML = "<span></span><span></span><span></span>";

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

async function handleSend() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;

  const welcome = messages.querySelector(".welcome");
  if (welcome) welcome.remove();

  addMessage(text, "user");
  input.value = "";
  input.style.height = "42px";

  showTyping();

  const delay = 900 + Math.random() * 700;
  setTimeout(async () => {
    hideTyping();
    const apiReply = await callLLM(text, convState);
    if (apiReply) {
      addMessage(apiReply, "ai");
    } else {
      addMessage(buildResponse(text), "ai");
    }
  }, delay);
}

function sendQuick(text) {
  // Reset state if starting fresh topic
  const freshTopics = ["考虑辞职","备考考公","薪资问题","考虑转行","情感支持"];
  if (freshTopics.some(t => text.includes(t))) {
    convState = { phase: "listen", intent: null, industry: null, turnCount: 0, userAskedAdvice: false };
  }
  document.getElementById("chatInput").value = text;
  handleSend();
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

function autoResize(el) {
  el.style.height = "42px";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

// ── EMPATHY PARTICLES (语气词随机池) ─────────────────────────────────
const PARTICLES = {
  soft:    ["唉，", "哎，", "嗯……", "哦——", "啊，"],
  warm:    ["心疼你。", "真的辛苦了。", "听到这里我有点心酸。", "你已经很不容易了。", "这真的不好受。"],
  affirm:  ["说得对。", "你的感受很真实。", "这不是你的错。", "你没有做错什么。", "这种感觉很正常。"],
  bridge:  ["继续说，我在。", "还有吗，我想听。", "你说，我不急。", "慢慢来，不用整理好再说。"]
};

// 追踪最近用过的，避免重复
const recentParticles = { soft: -1, warm: -1, affirm: -1, bridge: -1 };

function getParticle(type) {
  const pool = PARTICLES[type];
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); }
  while (idx === recentParticles[type] && pool.length > 1);
  recentParticles[type] = idx;
  return pool[idx];
}

// 给纯共情回复加随机语气颗粒
function wrapWithParticle(text) {
  const soft = getParticle("soft");
  const warm = getParticle("warm");
  const bridge = getParticle("bridge");
  return `<p>${soft}${text}</p><p>${warm}</p><p>${bridge}</p>`;
}

// ── IDLE PROMPT SYSTEM (30秒无输入主动关怀) ──────────────────────────
let idleTimer = null;
let idleCount = 0;
let lastIdleMsg = -1;

const IDLE_MESSAGES = [
  "是在发呆吗……还是刚才那句话让你难过了？",
  "没事，不用急着说话。我就在这里。",
  "有时候有些话很难开口，慢慢来。",
  "如果现在不想说了也没关系，我不会走的。",
  "你还好吗？"
];

function resetIdleTimer() {
  clearTimeout(idleTimer);
  // 只有在对话已经开始、且不在欢迎页时才触发
  if (convState.turnCount === 0) return;
  idleTimer = setTimeout(() => {
    let idx;
    do { idx = Math.floor(Math.random() * IDLE_MESSAGES.length); }
    while (idx === lastIdleMsg && IDLE_MESSAGES.length > 1);
    lastIdleMsg = idx;
    idleCount++;
    // 最多主动触发2次，避免骚扰
    if (idleCount <= 2) {
      addMessage(`<p>${IDLE_MESSAGES[idx]}</p>`, "ai");
    }
  }, 30000);
}

// 监听输入框，有任何输入就重置计时器
document.getElementById("chatInput").addEventListener("input", resetIdleTimer);
document.getElementById("chatInput").addEventListener("focus", resetIdleTimer);

// ── 覆盖 handleSend 以集成 idle reset ────────────────────────────────
const _originalHandleSend = handleSend;
// 在发送时重置 idle 状态
const _wrappedHandleSend = async function() {
  idleCount = 0;
  clearTimeout(idleTimer);
  await _originalHandleSend();
  // 回复完成后重新开始计时
  setTimeout(resetIdleTimer, 1500);
};
// 替换全局引用
window.handleSend = _wrappedHandleSend;
document.querySelector(".send-btn").onclick = _wrappedHandleSend;
document.getElementById("chatInput").onkeydown = function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    _wrappedHandleSend();
  }
};

// Init
renderAtlas();
</script>
</body>
</html>
