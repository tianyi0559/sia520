<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sia 3.11 | Sisterhood Atlas - 先听你说 · 再帮你想</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FBFBF9;
            --sia-bubble-bg: #FFFFFF;
            --user-bubble-bg: #F1ECE3;
            --text-color-primary: #2C2C2C;
            --text-color-secondary: #6A6A6A;
            --border-color: #E5E5E0;
            --accent-gold: #D4AF37;
            --shadow-subtle: 0 4px 24px rgba(0,0,0,0.02);
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Noto Sans SC', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-color-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            line-height: 1.6;
            font-weight: 300;
        }

        /* Header: 指南针 Logo 回归 */
        header {
            padding: 25px 25px 15px 25px;
            background-color: rgba(251, 251, 249, 0.95);
            border-bottom: 0.5px solid var(--border-color);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            text-align: center;
        }

        .compass-logo {
            margin-bottom: 12px;
            display: inline-block;
        }

        header h1 {
            font-family: var(--font-serif);
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 1.5px;
            color: var(--text-color-primary);
            text-transform: uppercase;
        }

        header p {
            font-size: 11px;
            color: var(--text-color-secondary);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Chat Container */
        main {
            flex: 1;
            padding: 140px 20px 100px 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        #chat-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: var(--shadow-subtle);
            border: 0.5px solid var(--border-color);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .message.sia {
            align-self: flex-start;
            background-color: var(--sia-bubble-bg);
            border-bottom-left-radius: 2px;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-bubble-bg);
            border-bottom-right-radius: 2px;
            border: none;
        }

        /* 导流卡片样式 */
        .lock-card {
            background-color: #FAF8F5;
            border: 1px dashed var(--accent-gold);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .lock-header {
            font-family: var(--font-serif);
            color: var(--accent-gold);
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }

        .lock-card strong { font-weight: 500; display: block; margin-bottom: 5px; color: #000; }
        .lock-card em { font-size: 12px; color: var(--text-color-secondary); display: block; margin-top: 10px; }

        /* Input Area */
        #input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background-color: rgba(251, 251, 249, 0.95);
            border-top: 0.5px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        #input-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            background-color: #FFFFFF;
            border: 0.5px solid var(--border-color);
            border-radius: 25px;
            padding: 6px 10px 6px 18px;
        }

        #message-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: var(--font-sans);
            background: transparent;
        }

        #send-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color-secondary);
            padding: 8px;
            transition: all 0.3s;
        }

        #send-btn:hover { color: var(--accent-gold); transform: translateY(-1px); }

        .typing { font-size: 12px; color: #A0A0A0; margin-left: 10px; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <div class="compass-logo">
            <svg width="36" height="36" viewBox="0 0 100 100" style="fill:none; stroke:#D4AF37; stroke-width:1.2;">
                <circle cx="50" cy="50" r="45" stroke-dasharray="2 2"/>
                <path d="M50 5 L50 95 M5 50 L95 50" stroke="#E5E5E0" stroke-width="0.5"/>
                <path d="M50 20 L56 50 L50 80 L44 50 Z" fill="#D4AF37"/>
                <circle cx="50" cy="50" r="2" fill="#D4AF37"/>
            </svg>
        </div>
        <h1>Sisterhood Atlas</h1>
        <p>「 理 智 是 最 高 级 的 护 短 」</p>
    </header>

    <main id="chat-main">
        <div id="chat-container">
            <div class="message sia">
                <p>你好，我是 Sia。</p>
                <p>在这里，你可以放下所有“懂事”的伪装。我会站在你的视角，帮你精准识别生活中的逻辑陷阱与风险。先听你说。</p>
            </div>
        </div>
    </main>

    <div id="input-area">
        <div id="input-container">
            <input type="text" id="message-input" placeholder="输入你想咨询的情况...">
            <button id="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const chatMain = document.getElementById('chat-main');

        async function handleSend() {
            const text = messageInput.value.trim();
            if (!text) return;

            // 1. 显示用户消息
            addMsg(text, 'user');
            messageInput.value = '';
            scrollToBottom();

            // 2. 模拟 Sia 思考
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = 'Sia 正在调取精算逻辑...';
            chatContainer.appendChild(typing);
            scrollToBottom();

            await new Promise(r => setTimeout(r, 1800));
            typing.remove();

            // 3. 弹出内测导流卡片
            const response = `
                <div class="lock-card">
                    <div class="lock-header">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Sia 3.11 内测校验
                    </div>
                    <strong>由于瞬时访问量激增，深度精算报告已排队至 1500+ 位。</strong>
                    Sia 的每一次回复都涉及高昂的逻辑算力，为了保证质量，目前仅对首批【清醒成员】开放。
                    <br><br>
                    <strong>获取报告方式：</strong><br>
                    1. 前往小红书私信 Sia 发送：<strong>【我要赢】</strong><br>
                    2. 发送你的问题截图，Sia 背后团队将为你手动加急解码。
                    <em>“理智需要等待，但永远值得。”</em>
                </div>
            `;
            addMsg(siaResponse(response), 'sia');
            scrollToBottom();
        }

        function addMsg(content, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = typeof content === 'string' ? `<p>${content}</p>` : content;
            chatContainer.appendChild(div);
        }

        function siaResponse(html) {
            return `<div>基于你的描述，Sia 已捕捉到潜在的风险点，但详细解码报告已被加密。${html}</div>`;
        }

        function scrollToBottom() { chatMain.scrollTop = chatMain.scrollHeight; }

        sendBtn.addEventListener('click', handleSend);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
