<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sisterhood Atlas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&family=Noto+Serif+SC:wght@300;400&display=swap');

:root {
  --bg:      #F5F4F0;
  --surface: #FAFAF8;
  --surf2:   #F0EEE9;
  --border:  #E2DDD6;
  --border2: #CEC7BC;
  --ink:     #2C2C2C;
  --ink2:    #4A3728;
  --ink3:    #8A7F72;
  --ink4:    #B8B0A6;
  --accent:  #4A3728;
  --accent2: #7A5C3E;
  --green:   #3D6B4F;
  --red:     #8B3A3A;
  --sh:      rgba(44,44,44,0.07);
  --sh2:     rgba(44,44,44,0.13);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Lato','Noto Serif SC',sans-serif;font-weight:300;line-height:1.7;overflow:hidden}

.app{display:flex;flex-direction:column;height:100vh;max-width:680px;margin:0 auto}

/* HEADER */
.header{flex-shrink:0;padding:18px 28px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;animation:fadeDown .45s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{display:flex;flex-direction:column;gap:1px}
.logo-main{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:20px;letter-spacing:.04em;color:var(--ink2)}
.logo-sub{font-size:10px;letter-spacing:.2em;color:var(--ink4);text-transform:uppercase}
.header-nav{display:flex;gap:2px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:3px}
.nav-btn{padding:5px 15px;border:none;background:transparent;color:var(--ink3);font-family:'Lato',sans-serif;font-size:12px;font-weight:300;letter-spacing:.06em;cursor:pointer;border-radius:4px;transition:all .16s}
.nav-btn.active{background:var(--surface);color:var(--ink2);font-weight:400;box-shadow:0 1px 4px var(--sh2)}

/* PANELS */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.panel.active{display:flex}

/* MESSAGES */
.chat-messages{flex:1;overflow-y:auto;padding:32px 28px 12px;display:flex;flex-direction:column;gap:22px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding:48px 0 20px;animation:fadeUp .6s ease}
.welcome-mark{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:52px;font-weight:300;color:var(--ink2);line-height:1;margin-bottom:14px;opacity:.8}
.welcome-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--ink);letter-spacing:.04em;margin-bottom:6px}
.welcome-sub{font-size:11px;color:var(--ink4);letter-spacing:.14em;line-height:2.1}
.welcome-divider{width:28px;height:1px;background:var(--border2);margin:18px 0}
.welcome-prompts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:380px}

/* MESSAGE BUBBLES */
.message{display:flex;gap:11px;animation:fadeUp .26s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:5px}
.avatar.ai{background:var(--ink2);color:var(--bg);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px}
.avatar.user-av{background:var(--surf2);border:1px solid var(--border2);color:var(--ink3);font-size:10px;letter-spacing:.03em}
.bubble{max-width:76%;padding:13px 17px;border-radius:12px;font-size:14px;line-height:1.82}
.bubble.ai{background:var(--surface);border:1px solid var(--border);color:var(--ink);border-top-left-radius:3px}
.bubble.user{background:var(--ink2);color:rgba(255,255,255,.86);border-top-right-radius:3px;text-align:right}
.bubble p{margin-bottom:5px}
.bubble p:last-child{margin-bottom:0}

/* STEP CARD */
.step-card{margin-top:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg)}
.step-header{padding:7px 14px;background:var(--surf2);font-size:10px;letter-spacing:.16em;color:var(--ink3);text-transform:uppercase;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.step-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.step-body{padding:12px 14px;font-size:13px;color:var(--ink);line-height:1.88}
.step-body ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.step-body li{padding-left:13px;position:relative}
.step-body li::before{content:'';position:absolute;left:0;top:10px;width:4px;height:1px;background:var(--accent2)}

/* QUICK REPLIES */
.quick-replies{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.qr-btn{padding:5px 13px;border:1px solid var(--border2);background:var(--surface);color:var(--ink2);font-family:'Lato',sans-serif;font-size:12px;font-weight:300;cursor:pointer;border-radius:20px;transition:all .15s;letter-spacing:.02em}
.qr-btn:hover{border-color:var(--accent);background:var(--surf2);color:var(--accent)}

.verify-link{display:inline-block;margin-top:10px;font-size:11px;color:var(--ink4);text-decoration:none;border-bottom:1px solid var(--border2);letter-spacing:.06em;transition:color .14s}
.verify-link:hover{color:var(--accent);border-color:var(--accent)}
.disclaimer{font-size:10px;color:var(--ink4);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);letter-spacing:.06em}

/* TYPING */
.typing{display:flex;gap:5px;padding:15px 17px;align-items:center}
.typing span{width:5px;height:5px;background:var(--ink4);border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* RISK MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(44,44,44,.3);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .18s ease;padding:0}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:26px 26px 38px;width:100%;max-width:680px;border-top:1px solid var(--border);animation:slideUp .26s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-tag{font-size:10px;letter-spacing:.2em;color:var(--red);text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.modal-tag::before{content:'';display:inline-block;width:5px;height:5px;background:var(--red);border-radius:50%}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:300;color:var(--ink);margin-bottom:18px;letter-spacing:.02em}
.modal-items{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.modal-item{display:flex;gap:14px;padding:13px 15px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.modal-num{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--ink4);line-height:1;flex-shrink:0;padding-top:2px}
.modal-text{font-size:13px;color:var(--ink);line-height:1.75}
.modal-text strong{display:block;font-weight:400;color:var(--ink2);margin-bottom:2px;font-size:13px}
.modal-close{width:100%;padding:12px;border:1px solid var(--border2);background:transparent;color:var(--ink2);font-family:'Lato',sans-serif;font-size:13px;font-weight:300;letter-spacing:.08em;cursor:pointer;border-radius:8px;transition:all .15s}
.modal-close:hover{background:var(--surf2);border-color:var(--accent)}

/* INPUT AREA */
.chat-input-area{flex-shrink:0;padding:12px 20px 18px;background:var(--surface);border-top:1px solid var(--border)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.img-btn{width:40px;height:40px;border:1px solid var(--border2);background:var(--surf2);color:var(--ink3);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.img-btn:hover{border-color:var(--accent);color:var(--accent)}
.img-btn svg{width:16px;height:16px}
.input-wrap{flex:1}
#chatInput{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;color:var(--ink);font-family:'Lato','Noto Serif SC',sans-serif;font-size:14px;font-weight:300;resize:none;outline:none;line-height:1.6;min-height:42px;max-height:120px;transition:border-color .15s}
#chatInput:focus{border-color:var(--accent2)}
#chatInput::placeholder{color:var(--ink4)}
.send-btn{width:40px;height:40px;background:var(--ink2);border:none;border-radius:10px;color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .14s}
.send-btn:hover{background:var(--accent2)}
.send-btn svg{width:15px;height:15px}
.img-preview-wrap{display:none;margin-bottom:8px;position:relative;width:fit-content}
.img-preview-wrap.visible{display:block}
.img-preview{max-height:76px;border-radius:7px;border:1px solid var(--border);display:block}
.img-preview-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--ink2);color:var(--bg);border:none;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1}

/* ATLAS */
.atlas-header{padding:22px 28px 14px;border-bottom:1px solid var(--border);background:var(--surface)}
.atlas-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;font-style:italic;color:var(--ink2);margin-bottom:3px}
.atlas-sub{font-size:10px;color:var(--ink4);letter-spacing:.1em}
.atlas-grid{padding:14px 20px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1}
.atlas-grid::-webkit-scrollbar{width:3px}
.atlas-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.industry-card{border:1px solid var(--border);background:var(--surface);padding:13px 17px;cursor:pointer;border-radius:10px;transition:all .15s}
.industry-card:hover{border-color:var(--border2);background:var(--bg)}
.industry-card.expanded{border-color:var(--accent2)}
.card-top{display:flex;justify-content:space-between;align-items:center}
.industry-name{font-size:14px;color:var(--ink);font-weight:400;letter-spacing:.02em}
.card-badges{display:flex;gap:5px}
.badge{font-size:10px;padding:2px 9px;border-radius:10px;letter-spacing:.03em;font-weight:300}
.badge.good{background:#EBF5EE;color:#3D6B4F;border:1px solid #C8E6D0}
.badge.mid{background:#F5F0E8;color:#7A5C3E;border:1px solid #E8D8C0}
.badge.bad{background:#F5EAEA;color:#8B3A3A;border:1px solid #E8C8C8}
.card-detail{display:none;margin-top:13px;padding-top:13px;border-top:1px solid var(--border)}
.industry-card.expanded .card-detail{display:block}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.metric{background:var(--bg);padding:9px 11px;border-radius:7px;border:1px solid var(--border)}
.metric-label{font-size:9px;color:var(--ink4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.metric-value{font-size:19px;color:var(--ink2);font-weight:300;font-family:'Cormorant Garamond',serif}
.metric-unit{font-size:10px;color:var(--ink4);margin-left:2px;font-family:'Lato',sans-serif}
.bar-wrap{height:2px;background:var(--border);border-radius:1px;margin-top:6px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent2);border-radius:1px;transition:width .5s ease}
.salary-row{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:3px}
.salary-val{color:var(--ink2);font-weight:400}
.card-note{font-size:12px;color:var(--ink3);margin-top:9px;padding-top:9px;border-top:1px solid var(--border);line-height:1.75;font-style:italic}
.card-cta{margin-top:11px;display:flex;gap:7px}
.cta-btn{padding:6px 13px;font-size:11px;letter-spacing:.05em;cursor:pointer;border-radius:6px;transition:all .14s;text-decoration:none;display:inline-block;font-family:'Lato',sans-serif;font-weight:300}
.cta-chat{background:var(--ink2);border:1px solid var(--ink2);color:var(--bg)}
.cta-chat:hover{background:var(--accent2);border-color:var(--accent2)}
.cta-verify{background:transparent;border:1px solid var(--border2);color:var(--ink3)}
.cta-verify:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:480px){
  .header{padding:14px 16px 12px}
  .chat-messages{padding:22px 14px 10px;gap:16px}
  .bubble{max-width:88%;padding:11px 13px}
  .metrics{grid-template-columns:1fr}
  .chat-input-area{padding:10px 12px 16px}
  .atlas-grid{padding:10px 12px}
  .modal{padding:22px 18px 32px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo-wrap">
      <div class="logo-main">Sisterhood Atlas</div>
      <div class="logo-sub">先听你说 · 再帮你赢</div>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" onclick="switchPanel('chat',this)">对话</button>
      <button class="nav-btn" onclick="switchPanel('atlas',this)">指南针</button>
    </nav>
  </header>

  <div class="main">
    <div id="chatPanel" class="panel active">
      <div class="chat-messages" id="messages">
        <div class="welcome">
          <div class="welcome-mark">S</div>
          <div class="welcome-title">你好，我在这里</div>
          <div class="welcome-sub">不评判，不说教<br>只陪你把事情想清楚</div>
          <div class="welcome-divider"></div>
          <div class="welcome-prompts">
            <button class="qr-btn" onclick="sendQuick('我最近在考虑辞职，有点迷茫')">考虑辞职</button>
            <button class="qr-btn" onclick="sendQuick('想了解考公的路径')">备考考公</button>
            <button class="qr-btn" onclick="sendQuick('工资太低了不知道怎么办')">薪资问题</button>
            <button class="qr-btn" onclick="sendQuick('想转行但不知道从哪里开始')">考虑转行</button>
            <button class="qr-btn" onclick="sendQuick('在婚姻里感觉很累')">情感支持</button>
          </div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="img-preview-wrap" id="imgPreviewWrap">
          <img class="img-preview" id="imgPreview" src="" alt=""/>
          <button class="img-preview-remove" onclick="removeImage()">×</button>
        </div>
        <div class="input-row">
          <button class="img-btn" onclick="document.getElementById('imgInput').click()" title="上传截图">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)"/>
          <div class="input-wrap">
            <textarea id="chatInput" placeholder="说说你的情况…" rows="1" oninput="autoResize(this)"></textarea>
          </div>
          <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div id="atlasPanel" class="panel">
      <div class="atlas-header">
        <div class="atlas-title">行业指南针</div>
        <div class="atlas-sub">数据基于公开研究综合评估 · 仅供参考 · 请以实际平台核验</div>
      </div>
      <div class="atlas-grid" id="atlasGrid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="riskModal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-tag">Sia 风险预警</div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-items" id="modalItems"></div>
    <button class="modal-close" onclick="document.getElementById('riskModal').style.display='none'">我已了解，继续</button>
  </div>
</div>

<script>
const INDUSTRY_DB={

  "设计/创意":{pay_gap:.85,maternity:2,remote:.50,female_leadership:.40,salary:{junior:[6000,11000],mid:[11000,22000],senior:[22000,50000]},notes:"自由职业可能性高，平台接单可作为过渡或兼职方案。",verify:"https://www.zhipin.com"}

const RISK_ALERTS={

  ]},
  "结婚":{title:"婚前清单",items:[
    {head:"财产约定",body:"婚前财产公证不是不信任，是双方对等保护自己。尤其涉及房产、存款、股权。"},
    {head:"独立账户",body:"婚后保持一个属于自己的独立账户，维持基本的经济独立能力。"},
    {head:"职业连续",body:"婚姻不应中断你的职业发展。提前和对方明确家务、育儿的分工预期。"}

const USE_API=false;
const API_ENDPOINT="/api/chat";

async function callLLM(msg,ctx){
  if(!USE_API)return null;
  try{
    const r=await fetch(API_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:msg,context:ctx,temperature:0.4})});
    return(await r.json()).reply;
  }catch(e){return null;}
}

function detectIntent(t){for(const[k,v]of Object.entries(TRIGGERS)){if(v.some(w=>t.includes(w)))return k;}return"general";}
function detectIndustry(t){return Object.keys(INDUSTRY_DB).find(k=>t.includes(k))||null;}
function wantsAdvice(t){return ADVICE_SIGNALS.some(s=>t.includes(s));}
function detectRisk(t){return Object.keys(RISK_ALERTS).find(k=>t.includes(k))||null;}

const P={soft:["唉，","哎，","嗯……","哦——","啊，"],warm:["心疼你。","真的辛苦了。","听到这里我有点心酸。","你已经很不容易了。","这真的不好受。"],affirm:["你的感受很真实。","这不是你的错。","你没有做错什么。","这种感觉很正常。"],bridge:["继续说，我在。","还有吗，我想听。","你说，我不急。","慢慢来，不用整理好再说。"]};
const rP={soft:-1,warm:-1,affirm:-1,bridge:-1};
function gP(t){const pool=P[t];let i;do{i=Math.floor(Math.random()*pool.length);}while(i===rP[t]&&pool.length>1);rP[t]=i;return pool[i];}
function wrap(text){return`<p>${gP("soft")}${text}</p><p>${gP("warm")}</p><p>${gP("bridge")}</p>`;}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

function buildResponse(txt){
  const di=detectIntent(txt),ind=detectIndustry(txt);
  if(di!=="general"&&!convState.intent)convState.intent=di;
  if(ind)convState.industry=ind;
  if(wantsAdvice(txt))convState.userAskedAdvice=true;
  convState.turnCount++;
  const intent=convState.intent||di;
  if(convState.userAskedAdvice||convState.phase==="advise"){convState.phase="advise";return buildAdviceHTML(intent,convState.industry);}
  if(convState.phase==="listen"){convState.phase="explore";return wrap(rand(EF[intent]||EF.general));}
  if(convState.phase==="explore"){convState.phase="ready_check";return`<p>${rand(EE[intent]||EE.general)}</p><div class="quick-replies"><button class="qr-btn" onclick="sendQuick('帮我想想怎么办')">准备好了，帮我想想</button><button class="qr-btn" onclick="sendQuick('我还想多说说')">我还想多说说</button></div>`;}
  if(convState.phase==="ready_check"){convState.phase="advise";return`<p>${gP("warm")}</p><p>${gP("bridge")}</p><div class="quick-replies"><button class="qr-btn" onclick="sendQuick('好，帮我分析一下')">好，帮我分析一下</button><button class="qr-btn" onclick="sendQuick('我还没准备好')">我还没准备好</button></div>`;}
  return buildAdviceHTML(intent,convState.industry);
}

function buildAdviceHTML(intent,industry){
  const data=buildAdvice(intent,industry),ind=industry?INDUSTRY_DB[industry]:null;
  let h=`<p>${data.intro}</p><div class="step-card"><div class="step-header"><div class="step-dot"></div>一些想法，供你参考</div><div class="step-body"><ul>${data.points.map(p=>`<li>${p}</li>`).join("")}</ul></div></div>`;
  if(ind)h+=`<a class="verify-link" href="${ind.verify}" target="_blank">→ 去 Boss 直聘核验${industry}薪资数据</a>`;
  h+=`<div class="disclaimer">这些只是思路参考，最终怎么做还是你说了算</div>`;
  if(data.followups)h+=`<div class="quick-replies">${data.followups.map(q=>`<button class="qr-btn" onclick="sendQuick('${q}')">${q}</button>`).join("")}</div>`;
  return h;
}

const msgEl=document.getElementById("messages");

function addMessage(html,role){
  const w=document.createElement("div");w.className=`message ${role}`;
  const av=document.createElement("div");av.className=`avatar ${role==="ai"?"ai":"user-av"}`;av.textContent=role==="ai"?"S":"我";

function showTyping(){
  const w=document.createElement("div");w.className="message ai";w.id="typing-indicator";
  const av=document.createElement("div");av.className="avatar ai";av.textContent="S";
  const b=document.createElement("div");b.className="bubble ai typing";b.innerHTML="<span></span><span></span><span></span>";

function hideTyping(){const el=document.getElementById("typing-indicator");if(el)el.remove();}

async function handleSend(){
  const input=document.getElementById("chatInput");
  const text=input.value.trim();
  if(!text&&!pendingImage)return;
  const welcome=msgEl.querySelector(".welcome");if(welcome)welcome.remove();
  const rk=detectRisk(text);if(rk)setTimeout(()=>showRiskModal(rk),300);
  if(pendingImage){
    const w=document.createElement("div");w.className="message user";
    const av=document.createElement("div");av.className="avatar user-av";av.textContent="我";
    const b=document.createElement("div");b.className="bubble user";
    b.innerHTML=`${text?`<p>${text}</p>`:''}<img src="${pendingImage}" style="max-width:180px;border-radius:6px;margin-top:6px;display:block;margin-left:auto;">`;
    w.appendChild(av);w.appendChild(b);msgEl.appendChild(w);msgEl.scrollTop=msgEl.scrollHeight;
    removeImage();
  }else{addMessage(text,"user");}
  input.value="";input.style.height="42px";
  showTyping();
  const delay=900+Math.random()*600;
  setTimeout(async()=>{
    hideTyping();
    const api=await callLLM(text,convState);
    if(api){addMessage(api,"ai");}
    else if(pendingImage){addMessage(`<p>我看到你上传了截图。</p><p>你想让我帮你解读里面的内容吗？描述一下背景，我来帮你分析。</p><p><em style="font-size:11px;color:var(--ink4)">完整图片分析需接入 Vision API 后开启</em></p>`,"ai");}
    else{addMessage(buildResponse(text),"ai");}
    setTimeout(resetIdleTimer,1500);
  },delay);
}

function sendQuick(text){
  const fresh=["考虑辞职","备考考公","薪资问题","考虑转行","情感支持"];
  if(fresh.some(t=>text.includes(t)))convState={phase:"listen",intent:null,industry:null,turnCount:0,userAskedAdvice:false};
  document.getElementById("chatInput").value=text;
  handleSend();
}

function autoResize(el){el.style.height="42px";el.style.height=Math.min(el.scrollHeight,120)+"px";}

document.getElementById("chatInput").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}});
document.getElementById("sendBtn").addEventListener("click",handleSend);
document.getElementById("chatInput").addEventListener("input",()=>{autoResize(document.getElementById("chatInput"));resetIdleTimer();});
document.getElementById("chatInput").addEventListener("focus",resetIdleTimer);

let idleTimer=null,idleCount=0,lastIdleMsg=-1;
const IDLE=["是在发呆吗……还是刚才那句话让你难过了？","没事，不用急着说话。我就在这里。","有时候有些话很难开口，慢慢来。","如果现在不想说了也没关系，我不会走的。","你还好吗？"];

function resetIdleTimer(){
  clearTimeout(idleTimer);if(convState.turnCount===0)return;
  idleTimer=setTimeout(()=>{let i;do{i=Math.floor(Math.random()*IDLE.length);}while(i===lastIdleMsg&&IDLE.length>1);lastIdleMsg=i;idleCount++;if(idleCount<=2)addMessage(`<p>${IDLE[i]}</p>`,"ai");},30000);
}

function switchPanel(name,btn){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(name+"Panel").classList.add("active");
  btn.classList.add("active");
}

function formatSalary(r){return`${(r[0]/1000).toFixed(0)}k–${(r[1]/1000).toFixed(0)}k`;}
function maternityLabel(s){return{1:"较差",2:"一般",3:"中等",4:"较好",5:"最好"}[s]||"-";}
function maternityBadge(s){return s>=4?"good":s===3?"mid":"bad";}
function payGapBadge(r){return r>=.90?"good":r>=.83?"mid":"bad";}

function renderAtlas(){
  const grid=document.getElementById("atlasGrid");grid.innerHTML="";
  Object.entries(INDUSTRY_DB).forEach(([name,data])=>{
    const card=document.createElement("div");card.className="industry-card";
    card.innerHTML=`<div class="card-top" onclick="toggleCard(this.parentElement)"><div class="industry-name">${name}</div><div class="card-badges"><span class="badge ${payGapBadge(data.pay_gap)}">薪酬 ${Math.round(data.pay_gap*100)}%</span><span class="badge ${maternityBadge(data.maternity)}">生育${maternityLabel(data.maternity)}</span></div></div><div class="card-detail"><div class="metrics"><div class="metric"><div class="metric-label">薪酬性别比</div><div class="metric-value">${Math.round(data.pay_gap*100)}<span class="metric-unit">%</span></div><div class="bar-wrap"><div class="bar-fill" style="width:${data.pay_gap*100}%"></div></div></div><div class="metric"><div class="metric-label">生育保障</div><div class="metric-value">${data.maternity}<span class="metric-unit">/5</span></div><div class="bar-wrap"><div class="bar-fill" style="width:${data.maternity/5*100}%"></div></div></div><div class="metric"><div class="metric-label">远程比例</div><div class="metric-value">${Math.round(data.remote*100)}<span class="metric-unit">%</span></div><div class="bar-wrap"><div class="bar-fill" style="width:${data.remote*100}%"></div></div></div><div class="metric"><div class="metric-label">女性管理层</div><div class="metric-value">${Math.round(data.female_leadership*100)}<span class="metric-unit">%</span></div><div class="bar-wrap"><div class="bar-fill" style="width:${data.female_leadership*100}%"></div></div></div></div><div class="salary-row"><span>初级</span><span class="salary-val">${formatSalary(data.salary.junior)} /月</span></div><div class="salary-row"><span>中级</span><span class="salary-val">${formatSalary(data.salary.mid)} /月</span></div><div class="salary-row"><span>高级</span><span class="salary-val">${formatSalary(data.salary.senior)} /月</span></div><div class="card-note">${data.notes}</div><div class="card-cta"><button class="cta-btn cta-chat" onclick="goChat('${name}')">与 Sia 深聊</button><a class="cta-btn cta-verify" href="${data.verify}" target="_blank">核验薪资 →</a></div></div>`;
    grid.appendChild(card);
  });
}

function toggleCard(card){const w=card.classList.contains("expanded");document.querySelectorAll(".industry-card.expanded").forEach(c=>c.classList.remove("expanded"));if(!w)card.classList.add("expanded");}
function goChat(industry){switchPanel("chat",document.querySelector(".nav-btn"));sendQuick(`我想了解${industry}行业的转行机会`);}

renderAtlas();
</script>
</body>
</html>
